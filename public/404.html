<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fallback: redirect unknown paths to index with encoded route.
      var pathSegmentsToKeep = 1
      var locationParts = window.location.pathname.split('/').filter(Boolean)
      var basePath = '/' + locationParts.slice(0, pathSegmentsToKeep).join('/')
      var routePath = '/' + locationParts.slice(pathSegmentsToKeep).join('/')
      var search = window.location.search
      var hash = window.location.hash

      var redirectUrl =
        basePath +
        '/?' +
        routePath.replace(/&/g, '~and~') +
        (search ? '&' + search.slice(1).replace(/&/g, '~and~') : '') +
        hash

      window.location.replace(redirectUrl)
    </script>
  </head>
  <body></body>
</html>
